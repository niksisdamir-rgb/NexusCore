version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexuscore-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://nexususer:nexuspass@db:5432/nexuscore?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-supersecret}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16-alpine
    container_name: nexuscore-db
    environment:
      - POSTGRES_USER=nexususer
      - POSTGRES_PASSWORD=nexuspass
      - POSTGRES_DB=nexuscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexususer -d nexuscore"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
